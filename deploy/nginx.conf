# ABID AK — active nginx config (HTTP).
# deploy.sh --ssl replaces this with deploy/nginx.ssl.conf after issuing a certificate.

upstream abidak_frontend { server frontend:3000; }
upstream abidak_backend  { server backend:8000; }

server {
    listen 80;
    listen [::]:80;
    server_name samimreza.me www.samimreza.me _;
    client_max_body_size 12m;

    # proxy defaults inherited by every location below
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location /api/           { proxy_pass http://abidak_backend; }
    location = /health       { proxy_pass http://abidak_backend; }
    location /docs           { proxy_pass http://abidak_backend; }
    location /redoc          { proxy_pass http://abidak_backend; }
    location = /openapi.json { proxy_pass http://abidak_backend; }

    location / {
        proxy_pass http://abidak_frontend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
